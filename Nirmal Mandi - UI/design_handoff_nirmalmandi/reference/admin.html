<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NirmalMandi — Admin Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>html,body{margin:0;padding:0}*{box-sizing:border-box}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens/shared.jsx"></script>
<script type="text/babel" src="app/ds.jsx"></script>
<script type="text/babel" src="app/admin.jsx"></script>
<script type="text/babel" src="app/admin2.jsx"></script>
<script type="text/babel" src="app/admin3.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
function App() {
  return (
    <DesignCanvas>
      <DCSection id="cmd" title="Admin · Command center" subtitle="Sign in, monitor the platform, and clear the review queues.">
        <DCArtboard id="login" label="Admin login" width={1280} height={760}><window.AdminLogin /></DCArtboard>
        <DCArtboard id="dash" label="Dashboard" width={1280} height={880}><window.AdminDashboard /></DCArtboard>
        <DCArtboard id="kyc" label="KYC management" width={1280} height={740}><window.AdminKYC /></DCArtboard>
        <DCArtboard id="disputes" label="Disputes" width={1280} height={760}><window.AdminDisputes /></DCArtboard>
      </DCSection>
      <DCSection id="insight" title="Admin · Insight & ledger" subtitle="Heatmaps, the full order ledger, inventory health, and users.">
        <DCArtboard id="analytics" label="Analytics + ageing heatmap" width={1280} height={900}><window.AdminAnalytics /></DCArtboard>
        <DCArtboard id="tx" label="Transaction ledger" width={1280} height={820}><window.AdminTransactions /></DCArtboard>
        <DCArtboard id="inv" label="Inventory" width={1280} height={720}><window.AdminInventory /></DCArtboard>
        <DCArtboard id="users" label="User management" width={1280} height={760}><window.AdminUsers /></DCArtboard>
      </DCSection>
      <DCSection id="config" title="Admin · Configure & govern" subtitle="Categories, payouts, settings, audit trail, and alerts.">
        <DCArtboard id="cats" label="Categories" width={1280} height={760}><window.AdminCategories /></DCArtboard>
        <DCArtboard id="payouts" label="Payouts" width={1280} height={720}><window.AdminPayouts /></DCArtboard>
        <DCArtboard id="settings" label="Settings" width={1280} height={680}><window.AdminSettings /></DCArtboard>
        <DCArtboard id="audit" label="Audit log" width={1280} height={720}><window.AdminAudit /></DCArtboard>
        <DCArtboard id="notif" label="Notifications" width={1280} height={740}><window.AdminNotifications /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
