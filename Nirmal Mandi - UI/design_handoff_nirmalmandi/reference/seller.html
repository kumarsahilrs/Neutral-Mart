<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NirmalMandi — Seller</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>html,body{margin:0;padding:0}*{box-sizing:border-box}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens/shared.jsx"></script>
<script type="text/babel" src="app/ds.jsx"></script>
<script type="text/babel" src="app/seller.jsx"></script>
<script type="text/babel" src="app/seller2.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
function App() {
  return (
    <DesignCanvas>
      <DCSection id="ops" title="Seller · Operate" subtitle="Run the storefront — dashboard, inventory, listing creation, and fulfilment.">
        <DCArtboard id="dash" label="Dashboard" width={1280} height={760}><window.SellerDashboard /></DCArtboard>
        <DCArtboard id="listings" label="Listings manager" width={1280} height={760}><window.SellerListings /></DCArtboard>
        <DCArtboard id="new" label="Create new listing" width={1280} height={1020}><window.NewListing /></DCArtboard>
        <DCArtboard id="orders" label="Orders (fulfilment)" width={1280} height={780}><window.SellerOrders /></DCArtboard>
      </DCSection>
      <DCSection id="grow" title="Seller · Grow & get paid" subtitle="Analytics with AI insights, payouts & escrow, and business profile.">
        <DCArtboard id="analytics" label="Analytics" width={1280} height={900}><window.SellerAnalytics /></DCArtboard>
        <DCArtboard id="payouts" label="Payouts" width={1280} height={720}><window.SellerPayouts /></DCArtboard>
        <DCArtboard id="profile" label="Profile" width={1280} height={680}><window.SellerProfile /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
